<script>
/* ── MOON PHASE ── */
function julianDay(dt){
  var y=dt.getFullYear(),mo=dt.getMonth()+1,d=dt.getDate()+0.5;
  if(mo<=2){y--;mo+=12;}
  var A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(mo+1))+d+B-1524.5;
}
function moonPhase(dt){var c=(julianDay(dt)-2451549.5)/29.53058853;return c-Math.floor(c);}
function phaseDist(p,t){var d=Math.abs(p-t);return d>0.5?1-d:d;}
var moonCache={};
function buildMoonMap(y,m){
  var map={},days=new Date(y,m+1,0).getDate(),bn={dist:9,d:0},bf={dist:9,d:0};
  for(var d=1;d<=days;d++){
    var p=moonPhase(new Date(y,m,d));
    if(phaseDist(p,0)<bn.dist){bn.dist=phaseDist(p,0);bn.d=d;}
    if(phaseDist(p,0.5)<bf.dist){bf.dist=phaseDist(p,0.5);bf.d=d;}
  }
  if(bn.d)map[bn.d]="new";
  if(bf.d)map[bf.d]="full";
  return map;
}
function moonOf(y,m,d){var k=y+"-"+m;if(!moonCache[k])moonCache[k]=buildMoonMap(y,m);return moonCache[k][d]||null;}

/* ── LOCAL STORAGE NOTES ── */

function saveNotes(o){try{localStorage.setItem(SK,JSON.stringify(o));}catch(e){}}
function nk(y,m,d){return y+"-"+(m+1)+"-"+d;}
function getNotes(y,m,d){return(loadNotes()[nk(y,m,d)]||[]);}
function addNote(y,m,d,t){var o=loadNotes(),k=nk(y,m,d);if(!o[k])o[k]=[];o[k].push({id:Date.now(),text:t});saveNotes(o);}
function delNote(y,m,d,id){var o=loadNotes(),k=nk(y,m,d);if(!o[k])return;o[k]=o[k].filter(function(n){return n.id!==id;});if(!o[k].length)delete o[k];saveNotes(o);}

var LF={"1-1":[{cn:"春节",en:"Spring Festival",t:"trad"},{cn:"弥勒佛圣诞",en:"Maitreya Buddha",t:"tao"}],"1-9":[{cn:"玉皇大帝圣诞",en:"Jade Emperor",t:"tao"}],"1-15":[{cn:"元宵节",en:"Lantern Festival",t:"trad"},{cn:"天官圣诞",en:"Heaven Official",t:"tao"}],"1-19":[{cn:"邱长春真人圣诞",en:"Qiu Changchun",t:"tao"}],"2-2":[{cn:"土地公诞",en:"Earth God",t:"tao"}],"2-15":[{cn:"太上老君圣诞",en:"Laozi",t:"tao"}],"2-19":[{cn:"观音圣诞",en:"Guanyin Birthday",t:"tao"}],"2-21":[{cn:"普贤菩萨圣诞",en:"Samantabhadra",t:"tao"}],"3-3":[{cn:"玄天上帝圣诞",en:"Xuantian Shangdi",t:"tao"}],"3-15":[{cn:"财神圣诞",en:"God of Wealth",t:"tao"}],"3-23":[{cn:"妈祖圣诞",en:"Mazu",t:"tao"}],"4-4":[{cn:"文殊菩萨圣诞",en:"Manjushri",t:"tao"}],"4-8":[{cn:"释迦牟尼佛诞",en:"Buddha Birthday",t:"tao"}],"4-14":[{cn:"吕洞宾圣诞",en:"Lu Dongbin",t:"tao"}],"5-5":[{cn:"端午节",en:"Dragon Boat",t:"trad"}],"5-13":[{cn:"关圣帝君诞",en:"Guan Yu",t:"tao"}],"6-19":[{cn:"观音成道",en:"Guanyin Enlightenment",t:"tao"}],"6-24":[{cn:"关帝圣诞",en:"Guandi",t:"tao"}],"7-7":[{cn:"七夕节",en:"Qixi Festival",t:"trad"}],"7-15":[{cn:"中元节",en:"Ghost Festival",t:"trad"},{cn:"地官圣诞",en:"Earth Official",t:"tao"}],"7-18":[{cn:"西王母圣诞",en:"Queen Mother",t:"tao"}],"7-30":[{cn:"地藏王圣诞",en:"Ksitigarbha",t:"tao"}],"8-3":[{cn:"灶君圣诞",en:"Kitchen God",t:"tao"}],"8-15":[{cn:"中秋节",en:"Mid-Autumn",t:"trad"}],"9-9":[{cn:"重阳节",en:"Double Ninth",t:"trad"},{cn:"斗姆元君",en:"Doumu",t:"tao"}],"9-19":[{cn:"观音出家",en:"Guanyin Renunciation",t:"tao"}],"10-15":[{cn:"水官圣诞",en:"Water Official",t:"tao"}],"11-17":[{cn:"阿弥陀佛圣诞",en:"Amitabha",t:"tao"}],"12-8":[{cn:"腊八节",en:"Laba Festival",t:"trad"}],"12-23":[{cn:"祭灶送神",en:"Kitchen God Ascends",t:"tao"}],"12-30":[{cn:"除夕",en:"New Year Eve",t:"trad"}]};

function lyd(y){var s=348;for(var i=0x8000;i>0x8;i>>=1)s+=(LI[y-1900]&i)?1:0;return s+lld(y);}
function llm(y){return LI[y-1900]&0xf;}
function lld(y){return llm(y)?((LI[y-1900]&0x10000)?30:29):0;}
function lmd(y,m){return(LI[y-1900]&(0x10000>>m))?30:29;}
var BD=Date.UTC(1900,0,31);
function s2l(date){
  var off=Math.floor((Date.UTC(date.getFullYear(),date.getMonth(),date.getDate())-BD)/86400000);
  var y=1900,tmp=0;
  for(;y<2101&&off>0;y++){tmp=lyd(y);off-=tmp;}
  if(off<0){off+=tmp;y--;}
  var lp=llm(y),il=false,m=1;
  for(;m<13&&off>0;m++){
    if(lp>0&&m===lp+1&&!il){m--;il=true;tmp=lld(y);}
    else{tmp=lmd(y,m);}
    if(il&&m===lp+1)il=false;
    off-=tmp;
  }
  if(off===0&&lp>0&&m===lp+1){if(il){il=false;}else{il=true;m--;}}
  if(off<0){off+=tmp;m--;}
  return{year:y,month:m,day:off+1,isLeap:il};
}
function l2s(y,m,d,il){
  if(y<1900||y>2100)return null;
  var off=0;
  for(var i=1900;i<y;i++)off+=lyd(i);
  var lp=llm(y),ord=[];
  for(var i=1;i<=12;i++){ord.push({m:i,l:false});if(i===lp)ord.push({m:i,l:true});}
  var tot=0,done=false;
  for(var ix=0;ix<ord.length;ix++){var o=ord[ix];if(o.m===m&&o.l===il){done=true;break;}tot+=o.l?lld(y):lmd(y,o.m);}
  if(!done)return null;
  var mx=il?lld(y):lmd(y,m);
  if(d<1||d>mx)return null;
  off+=tot+(d-1);
  return new Date(BD+off*86400000);
}
function gzy(y){var i=(y-4)%60;return TG[i%10]+DZ[i%12]+"年";}
function zod(y){var i=(y-4)%60,s=i%10;return{cn:ZC[(y-4)%12],en:ZE[(y-4)%12],ec:EC[s],ee:EL[s],ex:EX[s]};}
function fests(l){
  if(l.isLeap)return[];
  var k=l.month+"-"+l.day,r=(LF[k]||[]).slice();
  if(l.month===12){var lx=lmd(l.year,12);if(l.day===lx&&!LF[k])r=r.concat(LF["12-30"]||[]);}
  return r;
}
function cellLabel(l){
  var f=fests(l);
  if(f.length)return{t:f[0].cn.split("·")[0],f:true};
  if(l.day===1)return{t:(l.isLeap?"闰":"")+CM[l.month-1]+"月",f:false};
  return{t:CD[l.day-1],f:false};
}
function pad(n){return String(n).padStart(2,"0");}
function donly(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

/* ── AGE ── */
var LBD=null,LLY=null;
function aod(){if(document.getElementById("aToday").checked)return new Date();return new Date(+SEL.aYear.value,+SEL.aMonth.value-1,+SEL.aDay.value);}
function cage(b,r){return Math.max(s2l(r).year-s2l(b).year+1,1);}
function aoderr(b){
  var r=aod();
  if(donly(r)<donly(b))return"⚠️ \"As of\" ("+r.getFullYear()+"-"+pad(r.getMonth()+1)+"-"+pad(r.getDate())+") is before birth date ("+b.getFullYear()+"-"+pad(b.getMonth()+1)+"-"+pad(b.getDate())+"). Please select a later date.";
  return null;
}
function buildResult(gs,ls,le,fc,fe,b,ly){
  LBD=b;LLY=ly;
  var z=zod(ly),err=aoderr(b),r=aod();
  var rs=r.getFullYear()+"-"+pad(r.getMonth()+1)+"-"+pad(r.getDate());
  var fr=fc?"<tr><td>Festival<br><span class='sub'>节日</span></td><td>"+fc+"<br><span class='sub'>"+fe+"</span></td></tr>":"";
  var ag=err?"<div class='err-box'>"+err+"</div>"
    :"<div class='asof-note'>As of: "+rs+"</div><div class='agebox'><div><div class='num'>"+cage(b,r)+"</div><div class='lbl'>虚岁 Chinese Age</div></div></div>";
  return"<table class='res-table'>"
    +"<tr><td>Standard<br><span class='sub'>公历</span></td><td>"+gs+"</td></tr>"
    +"<tr><td>Lunar<br><span class='sub'>农历</span></td><td>"+ls+"<br><span class='sub'>"+le+"</span></td></tr>"
    +"<tr><td>Zodiac<br><span class='sub'>生肖</span></td><td class='zodiac-cell'>"+z.cn+" "+z.en
    +"<span class='element-badge' style='background:"+z.ex+"'>"+z.ee+" "+z.ec+"</span></td></tr>"
    +fr+"</table>"+ag;
}
function convertG(){
  var y=+SEL.gYear.value,m=+SEL.gMonth.value,d=+SEL.gDay.value;
  var dt=new Date(y,m-1,d),l=s2l(dt),z=zod(l.year),f=fests(l);
  document.getElementById("convResult").innerHTML=buildResult(
    MEN[m-1]+" "+d+", "+y,
    (l.isLeap?"闰":"")+l.year+"年 "+CM[l.month-1]+"月 "+CD[l.day-1],
    gzy(l.year)+" · Year of the "+z.en+" · "+CME[l.month-1]+" Day "+l.day,
    f.map(function(x){return x.cn;}).join("、"),f.map(function(x){return x.en;}).join(", "),dt,l.year);
}
function convertC(){
  var y=+SEL.cYear.value,m=+SEL.cMonth.value,d=+SEL.cDay.value,lp=document.getElementById("cLeap").checked;
  var res=document.getElementById("convResult");
  if(lp&&llm(y)!==m){res.innerHTML="<div class='err-box'>⚠️ "+y+"年没有闰"+CM[m-1]+"月 / Year "+y+" has no leap "+CME[m-1]+".</div>";LBD=null;return;}
  var dt=l2s(y,m,d,lp);
  if(!dt){res.innerHTML="<div class='err-box'>⚠️ 无效农历日期 / Invalid lunar date.</div>";LBD=null;return;}
  var l=s2l(dt),z=zod(y),f=fests(l),gy=dt.getFullYear(),gm=dt.getMonth()+1,gd=dt.getDate();
  res.innerHTML=buildResult(
    MEN[gm-1]+" "+gd+", "+gy,
    (lp?"闰":"")+y+"年 "+CM[m-1]+"月 "+CD[d-1],
    gzy(y)+" · Year of the "+z.en+" · "+CME[m-1]+" Day "+d,
    f.map(function(x){return x.cn;}).join("、"),f.map(function(x){return x.en;}).join(", "),dt,y);
}
function recalcAge(){
  if(!LBD)return;
  var err=aoderr(LBD),r=aod();
  var rs=r.getFullYear()+"-"+pad(r.getMonth()+1)+"-"+pad(r.getDate());
  var ne=document.querySelector(".asof-note"),nu=document.querySelector(".agebox .num");
  var ab=document.querySelector(".agebox"),eb=document.querySelector("#convResult .err-box");
  if(err){
    if(ab){var n=document.querySelector(".asof-note");if(n)n.remove();ab.outerHTML="<div class='err-box'>"+err+"</div>";}
    else if(eb)eb.innerHTML=err;
  }else{
    var a=cage(LBD,r);
    if(eb)eb.outerHTML="<div class='asof-note'>As of: "+rs+"</div><div class='agebox'><div><div class='num'>"+a+"</div><div class='lbl'>虚岁 Chinese Age</div></div></div>";
    else{if(ne)ne.textContent="As of: "+rs;if(nu)nu.textContent=a;}
  }
}
function showView(v){
  document.getElementById("viewConv").style.display=v==="conv"?"block":"none";
  document.getElementById("viewCal").style.display=v==="cal"?"block":"none";
  document.querySelector(".btn-conv").classList.toggle("active",v==="conv");
  document.querySelector(".btn-cal").classList.toggle("active",v==="cal");
  if(v==="cal")renderCal();
}

/* ── CALENDAR ── */
var VD=new Date();
function renderCal(){
  var y=VD.getFullYear(),m=VD.getMonth(),mid=s2l(new Date(y,m,15)),z=zod(mid.year);
  document.getElementById("calTitle").innerHTML=MEN[m]+" "+y
    +"<small>"+gzy(mid.year)+" · Year of the "+z.en
    +" <span style='background:"+z.ex+";color:#fff;padding:1px 6px;border-radius:6px;font-size:10px'>"+z.ee+" "+z.ec+"</span></small>";
  var first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),today=new Date();
  var html="",cell=0;
  for(var i=0;i<first;i++){html+="<td class='empty'></td>";cell++;}
  for(var d=1;d<=days;d++){
    var dt=new Date(y,m,d),l=s2l(dt),fs=fests(l),lb=cellLabel(l);
    var moon=moonOf(y,m,d),hn=hasNote(y,m,d),it=dt.toDateString()===today.toDateString();
    var dots="";
    if(fs.some(function(f){return f.t==="trad";}))dots+="<span class='dot trad'></span>";
    if(fs.some(function(f){return f.t==="tao";}))dots+="<span class='dot tao'></span>";
    if(hn)dots+="<span class='dot entry'></span>";
    var cls=it?"today"+(hn?" has-entry":""):hn?"has-entry":fs.length?"fest":moon==="new"?"newmoon":moon==="full"?"fullmoon":"";
    var pv="";
    if(hn){var ns=getNotes(y,m,d);if(ns.length)pv="<span class='entry-preview'>"+esc(ns[0].text)+"</span>";}
    var mi=moon==="new"?"<span class='moon-icon'>🌑</span>":moon==="full"?"<span class='moon-icon'>🌕</span>":"";
    html+="<td class='"+cls+"' onclick='showDetail("+y+","+m+","+d+")'>"
      +dots+"<span class='g-day'>"+d+"</span>"
      +"<span class='c-day"+(lb.f?" festival":"")+"'>"+lb.t+"</span>"+pv+mi+"</td>";
    cell++;if(cell%7===0)html+="</tr><tr>";
  }
  document.getElementById("calBody").innerHTML="<tr>"+html+"</tr>";
}
function changeMonth(n){VD.setMonth(VD.getMonth()+n);renderCal();}
function jumpToday(){VD=new Date();renderCal();var t=new Date();showDetail(t.getFullYear(),t.getMonth(),t.getDate());document.getElementById("detail").scrollIntoView({behavior:"smooth",block:"nearest"});}

/* ── DETAIL + NOTES ── */
var DY,DM,DD;
function showDetail(y,m,d){DY=y;DM=m;DD=d;renderDetail();document.getElementById("detail").classList.add("show");}
function renderDetail(){
  var y=DY,m=DM,d=DD,dt=new Date(y,m,d),l=s2l(dt),fs=fests(l),z=zod(l.year);
  var moon=moonOf(y,m,d),it=dt.toDateString()===new Date().toDateString();
  var ed=dt.toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  var tags="";
  fs.forEach(function(f){tags+="<span class='tag "+f.t+"'>"+f.cn+"<small>"+f.en+"</small></span>";});
  if(moon==="new")tags+="<span class='tag moon'>🌑 New Moon<small>新月</small></span>";
  if(moon==="full")tags+="<span class='tag moon'>🌕 Full Moon<small>满月</small></span>";
  var ns=getNotes(y,m,d),nh="";
  ns.forEach(function(n){nh+="<div class='entry-item'><span class='entry-text'>"+esc(n.text)+"</span><button class='entry-del' onclick='delEntry("+n.id+")'>✕</button></div>";});
  if(!ns.length)nh="<div class='no-entry'>No notes yet — add one below</div>";
  document.getElementById("detail").innerHTML=
    "<h3>"+MEN[m]+" "+d+", "+y+(it?" 📍 Today":"")+"<br><span class='ens'>"+ed+"</span></h3>"
    +"<div class='line'><b>Lunar:</b> "+gzy(l.year)+" "+(l.isLeap?"闰":"")+CM[l.month-1]+"月 "+CD[l.day-1]
    +"<br><span class='ens'>Year of the "+z.en+" <span style='background:"+z.ex+";color:#fff;padding:1px 6px;border-radius:6px;font-size:10px'>"+z.ee+" "+z.ec+"</span> · "+CME[l.month-1]+" Day "+l.day+"</span></div>"
    +((fs.length||moon)?"<div class='line'><b>Festivals / Phases:</b></div>"+tags:"<div class='line'>No festival today</div>")
    +"<div class='entry-section'><h4>✏️ My Notes / 我的记事</h4><div class='entry-list'>"+nh+"</div>"
    +"<div class='entry-add-row'><textarea class='entry-input' id='entryInput' placeholder='Add a note...'></textarea>"
    +"<button class='entry-save-btn' onclick='saveEntry()'>Save</button></div></div>";
  var inp=document.getElementById("entryInput");
  if(inp){
    inp.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();saveEntry();}});
    inp.addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,120)+"px";});
  }
}
function saveEntry(){
  var inp=document.getElementById("entryInput");if(!inp)return;
  var t=inp.value.trim();if(!t)return;
  inp.value="";inp.style.height="";
  addNote(DY,DM,DD,t);renderDetail();renderCal();
}
function delEntry(id){delNote(DY,DM,DD,id);renderDetail();renderCal();}

/* ── DROPDOWNS — createElement only (iOS Safari safe) ── */
var SEL={};
function addOpt(sel,val,txt){var o=document.createElement("option");o.value=val;o.text=txt;sel.appendChild(o);}
function clearSel(sel){while(sel.options.length)sel.remove(0);}
function fillNum(sel,a,b){clearSel(sel);for(var i=a;i<=b;i++)addOpt(sel,i,String(i));}
function fillLabels(sel,arr){clearSel(sel);for(var i=0;i<arr.length;i++)addOpt(sel,arr[i].v,arr[i].t);}
function gDaysMax(){return new Date(+SEL.gYear.value,+SEL.gMonth.value,0).getDate();}
function refreshGDay(){
  var mx=gDaysMax(),pv=+SEL.gDay.value||1;
  clearSel(SEL.gDay);for(var i=1;i<=mx;i++)addOpt(SEL.gDay,i,String(i));
  SEL.gDay.value=Math.min(pv,mx);
}
function refreshCDay(){
  var y=+SEL.cYear.value,m=+SEL.cMonth.value,lp=document.getElementById("cLeap").checked;
  var mx=lp?(llm(y)===m?lld(y):0):lmd(y,m),pv=+SEL.cDay.value||1;
  clearSel(SEL.cDay);
  if(mx===0){addOpt(SEL.cDay,1,"—");return;}
  for(var i=1;i<=mx;i++)addOpt(SEL.cDay,i,CD[i-1]);
  SEL.cDay.value=Math.min(pv,mx);
}
function refreshADay(){
  var mx=new Date(+SEL.aYear.value,+SEL.aMonth.value,0).getDate(),pv=+SEL.aDay.value||1;
  clearSel(SEL.aDay);for(var i=1;i<=mx;i++)addOpt(SEL.aDay,i,String(i));
  SEL.aDay.value=Math.min(pv,mx);
}
function applyAToday(){
  var dis=document.getElementById("aToday").checked;
  SEL.aYear.disabled=dis;SEL.aMonth.disabled=dis;SEL.aDay.disabled=dis;recalcAge();
}

function init(){
  SEL.gYear=document.getElementById("gYear");
  SEL.gMonth=document.getElementById("gMonth");
  SEL.gDay=document.getElementById("gDay");
  SEL.cYear=document.getElementById("cYear");
  SEL.cMonth=document.getElementById("cMonth");
  SEL.cDay=document.getElementById("cDay");
  SEL.aYear=document.getElementById("aYear");
  SEL.aMonth=document.getElementById("aMonth");
  SEL.aDay=document.getElementById("aDay");

  /* Year dropdowns */
  fillNum(SEL.gYear,1900,2100);
  fillNum(SEL.cYear,1900,2100);
  fillNum(SEL.aYear,1900,2100);

  /* Month dropdowns */
  fillLabels(SEL.gMonth,MSH.map(function(s,i){return{v:i+1,t:s};}));
  fillLabels(SEL.cMonth,CM.map(function(s,i){return{v:i+1,t:s+"月"};}));
  fillLabels(SEL.aMonth,MSH.map(function(s,i){return{v:i+1,t:s};}));

  /* Set to today */
  var t=new Date();
  SEL.gYear.value=t.getFullYear();
  SEL.gMonth.value=t.getMonth()+1;
  refreshGDay();
  SEL.gDay.value=t.getDate();

  SEL.cYear.value=t.getFullYear();
  SEL.cMonth.value=1;
  refreshCDay();

  SEL.aYear.value=t.getFullYear();
  SEL.aMonth.value=t.getMonth()+1;
  refreshADay();
  SEL.aDay.value=t.getDate();

  /* Change handlers */
  SEL.gYear.onchange=refreshGDay;
  SEL.gMonth.onchange=refreshGDay;
  SEL.cYear.onchange=refreshCDay;
  SEL.cMonth.onchange=refreshCDay;
  document.getElementById("cLeap").onchange=refreshCDay;
  SEL.aYear.onchange=function(){refreshADay();recalcAge();};
  SEL.aMonth.onchange=function(){refreshADay();recalcAge();};
  SEL.aDay.onchange=recalcAge;
  document.getElementById("aToday").onchange=applyAToday;
  applyAToday();
}

document.addEventListener("DOMContentLoaded",init);
</script>
